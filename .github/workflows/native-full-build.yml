name: Build Component in Native Environment
permissions:
  contents: read
  checks: write

on:
  workflow_dispatch:
  push:
    branches: [topic/test-build] 
  pull_request:
    branches: [topic/test-build]

env:
  AUTOMATICS_UNAME: ${{ secrets.AUTOMATICS_UNAME }}
  AUTOMATICS_PASSCODE: ${{ secrets.AUTOMATICS_PASSCODE }}

jobs:
  build-and-test-l1:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main source repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            git cmake gperf ruby-dev libglew-dev libglut-dev \
            libglib2.0-dev libglib2.0-0 g++ meson bison libjpeg-dev libpng-dev \
            libfreetype6-dev libicu-dev autoconf libtool libxml2-dev \
            libcurl4-openssl-dev libexpat1-dev doxygen vim libcjson-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libwayland-bin libwayland-dev wayland-protocols \
            libreadline-dev net-tools libmount1 libpcre3 libselinux1 zlib1g \
            libunwind-dev libboost-dev libboost-system-dev libboost-thread-dev libboost-chrono-dev libwebsocketpp-dev

      - name: Download externals.zip from GitHub release (private repo)
        run: |
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/octet-stream" \
            -o externals.zip \
            https://github.com/rdk-e/rdkNativeScript_tests/releases/download/extlibs/externals.zip

      - name: Check externals.zip download
        run: |
          file externals.zip
          ls -lh externals.zip
          head -40 externals.zip | cat

      - name: Extract externals.zip
        run: |
          unzip -o externals.zip

      - name: Symlinks for JavaScriptCore libraries
        run: |
          cd externals/extlibs/lib
          ln -sf libJavaScriptCore.so.1.0.0 libJavaScriptCore.so.1
          ln -sf libJavaScriptCore.so.1 libJavaScriptCore.so

          ln -sf libessos.so.0.0.0 libessos.so.0
          ln -sf libessos.so.0 libessos.so

          ln -sf libessosrmgr.so.0.0.0 libessosrmgr.so.0
          ln -sf libessosrmgr.so.0 libessosrmgr.so

          ln -sf libuv.so.1.0.0 libuv.so.1
          ln -sf libuv.so.1 libuv.so

      - name: Symlinks for x86_64-linux-gnu libraries
        run: |
          cd externals/extlibs/lib/x86_64-linux-gnu
          ln -sf libgio-2.0.so.0.6200.4 libgio-2.0.so.0
          ln -sf libgio-2.0.so.0 libgio-2.0.so

          ln -sf libgmodule-2.0.so.0.6200.4 libgmodule-2.0.so.0
          ln -sf libgmodule-2.0.so.0 libgmodule-2.0.so

          ln -sf libgthread-2.0.so.0.6200.4 libgthread-2.0.so.0
          ln -sf libgthread-2.0.so.0 libgthread-2.0.so

      - name: Set LD_LIBRARY_PATH for ICU 66
        run: echo "LD_LIBRARY_PATH=$(pwd)/externals/extlibs/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Configure and build nativescript
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DENABLE_JSRUNTIME_ESSOS=ON \
            -DJSRUNTIME_ENGINE_NAME=jsc \
            -DENABLE_JSRUNTIME_PLAYER=ON \
            -DENABLE_AAMP_JSBINDINGS_DYNAMIC=ON \
            -DBUILD_JSRUNTIME_CLIENT=ON \
            -DENABLE_JSRUNTIME_SERVER=ON \
            -DCMAKE_CXX_FLAGS="-I../externals/extlibs/include/rtcore"
          cmake --build .

      - name: Upload build outputs to artifact
        uses: actions/upload-artifact@v4
        with:
          name: jsruntime-build-artifacts
          path: |
            build/JSRuntimeClient
            build/JSRuntimeJSC
            build/libjsclib.so
            build/libJSRuntimeJSC.so
          if-no-files-found: error
